<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — FOSS Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f0f6ff;
      --surface: #ffffff;
      --border:  rgba(0,0,0,0.08);
      --text:    #1e293b;
      --muted:   #64748b;
      --accent:  #2563eb;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'Space Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(37,99,235,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 60px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #2563eb, #818cf8, #34d399);
      border-radius: 20px 20px 0 0;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(37,99,235,0.07);
      border: 1px solid rgba(37,99,235,0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 28px;
    }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.75;
      margin-bottom: 36px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(37,99,235,0.35);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .back-btn:hover {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    .notify-hint {
      margin-top: 24px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚀</div>
    <p class="eyebrow">Registration</p>
    <h1>Registrations will<br>open soon</h1>
    <p>We're putting the finishing touches on our registration system. Check back closer to the event date — it'll be worth the wait.</p>
    <a href="index.html" class="back-btn">← Back to Events</a>
    <p class="notify-hint">Stay tuned — updates coming soon!</p>
  </div>
</body>
</html>
